services:
  zencoder2api:
    image: "ghcr.io/bglzdgrlcg/zencoder2api:latest"
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BIND_ADDRESS: "0.0.0.0"
      DB_PATH: /data/data.db
      AUTH_TOKEN: "sk-123"
      ADMIN_PASSWORD: "admin123"
    volumes:
      - zencoder2api-data:/data

volumes:
  zencoder2api-data:
