services:
  zencoder2api:
    image: ghcr.io/bglzdgrlcg/zencoder2api:latest
    container_name: zencoder2api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DB_PATH: /data/data.db
      AUTH_TOKEN: "${AUTH_TOKEN:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      LOG_LEVEL: "${LOG_LEVEL:-silent}"
      DEBUG: "${DEBUG:-false}"
    volumes:
      - zencoder2api-data:/data

volumes:
  zencoder2api-data:
