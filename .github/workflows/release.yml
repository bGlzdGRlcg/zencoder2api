name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly
  GOTOOLCHAIN: local
  IMAGE_NAME: ghcr.io/bglzdgrlcg/zencoder2api

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.release_commit.outputs.commit_sha }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag and ancestry
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must be valid SemVer" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Pin verified release commit
        id: release_commit
        shell: bash
        run: echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          check-latest: false
          cache-dependency-path: go.sum

      - name: Verify Go source
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l .)"
          go test ./...
          go test -race ./...
          go vet ./...
          go build -trimpath -buildvcs=false ./...
          go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Scan tracked content
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.28.0
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  release-assets:
    name: Build release assets
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ needs.verify.outputs.commit_sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          check-latest: false
          cache-dependency-path: go.sum

      - name: Build archives
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${RELEASE_TAG#v}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "$target"
            name="zencoder2api_${version}_${goos}_${goarch}"
            stage="dist/${name}"
            binary="zencoder2api"
            if [[ "$goos" == "windows" ]]; then
              binary+=".exe"
            fi

            mkdir -p "$stage"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" \
              go build -trimpath -buildvcs=false -ldflags="-s -w -buildid=" \
              -o "$stage/$binary" .
            cp -R web LICENSE .env.example DEPLOYMENT.md "$stage/"
            find "$stage" -exec touch -h -t 198001010000.00 {} +

            if [[ "$goos" == "windows" ]]; then
              (cd "$stage" && zip -q -X -r "../${name}.zip" .)
            else
              tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 \
                --numeric-owner -C "$stage" -czf "dist/${name}.tar.gz" .
            fi
            rm -rf "$stage"
          done

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false

      - name: Generate checksums
        shell: bash
        run: sha256sum dist/*.tar.gz dist/*.zip dist/sbom.spdx.json > dist/checksums.txt

      - name: Attest release assets
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/*

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  docker:
    name: Publish Docker image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out verified release commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ needs.verify.outputs.commit_sha }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event.release.tag_name }}
            REVISION=${{ needs.verify.outputs.commit_sha }}
            SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest image digest
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
