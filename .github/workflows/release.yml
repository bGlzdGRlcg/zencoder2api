name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/bglzdgrlcg/zencoder2api

jobs:
  release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          version="${{ github.event.release.tag_name }}"
          version="${version//\//-}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="zencoder2api_${version}_${goos}_${goarch}"
            stage="dist/${name}"
            binary="zencoder2api"
            if [[ "${goos}" == "windows" ]]; then
              binary+=".exe"
            fi

            mkdir -p "${stage}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" -o "${stage}/${binary}" .
            cp -R web LICENSE .env.example "${stage}/"

            if [[ "${goos}" == "windows" ]]; then
              (cd "${stage}" && zip -q -r "../${name}.zip" .)
            else
              tar -C "${stage}" -czf "dist/${name}.tar.gz" .
            fi
            rm -rf "${stage}"
          done

          sha256sum dist/*.tar.gz dist/*.zip > dist/checksums.txt

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber

  docker:
    name: Publish Docker image
    needs: release-assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
